name: Build and Push to Docker Hub

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Manual version tag (e.g. v1.0.0)'
        required: false
        type: string

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/anthropic-proxy

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.ref_name }}

      - name: Set version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.version }}}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAGS="$IMAGE:$TAG,$IMAGE:$TAG-${GITHUB_SHA}"
          # Stable if: v1.x.x or v2.x.x (not v0.x.x, not v1.0.0-beta)
          if echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            TAGS="$TAGS,$IMAGE:latest"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: PROXY_VERSION=${{ github.ref_name }}
          # :latest is pushed from the SAME build as the versioned tags (one
          # digest, PROXY_VERSION included) — a separate latest-only build step
          # previously omitted PROXY_VERSION, so :latest reported "unknown" on
          # /health and couldn't be matched to a release (PHA-1391).
          tags: ${{ steps.version.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Anthropic OAuth Proxy
            org.opencontainers.image.description=Thin proxy that fixes OAuth token handling for Anthropic API — Unraid Docker image
            org.opencontainers.image.source=https://github.com/phattbeats/anthropic-proxy
